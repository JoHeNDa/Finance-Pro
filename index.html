<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IUS Finance Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Premium fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- ⭐ Critical script to set dark mode BEFORE React loads – prevents white flash -->
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('app-theme');
          // Default to 'dark' if no saved preference
          const theme = savedTheme && ['light', 'dark', 'green'].includes(savedTheme) ? savedTheme : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.classList.add(`theme-${theme}`);
        } catch (e) {}
      })();
    </script>

    <style>
      /* Ensure body background matches dark mode during loading */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #0f0f1a; /* dark mode bg-primary */
        transition: background-color 0.3s ease;
      }
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      h1, h2, h3, h4, .card-value, .kpi-value {
        font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .amount, .stat-number, .kpi-value {
        font-feature-settings: "tnum";
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
